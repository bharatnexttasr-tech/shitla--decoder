<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fuel Entry — TASR/UIPL</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#f4f6fa;color:#1a2233;min-height:100vh;}
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
input[type=number]{-moz-appearance:textfield;}
 
.topbar{background:#1a3a6b;color:#fff;padding:0 24px;height:52px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 8px rgba(0,0,0,0.15);}
.topbar .logo{font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#ffc107;border-right:1px solid rgba(255,255,255,0.2);padding-right:14px;}
.topbar h1{font-size:15px;font-weight:600;}
 
.main{padding:16px 16px 80px;}
 
/* INPUT PANEL */
.input-panel{background:#fff;border:1px solid #d0d8e8;border-radius:10px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.input-panel textarea{width:100%;height:140px;border:1px solid #d0d8e8;border-radius:6px;padding:10px 12px;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.8;resize:vertical;outline:none;background:#fafbfd;color:#1a2233;}
.input-panel textarea:focus{border-color:#25d366;background:#fff;}
.input-hint{font-size:11px;color:#6b7a99;margin-bottom:8px;}
.btn-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center;}
button{font-family:'Inter',sans-serif;font-weight:600;font-size:12px;border:none;padding:9px 20px;cursor:pointer;border-radius:7px;transition:all 0.15s;}
.btn-primary{background:#25d366;color:#fff;}
.btn-primary:hover{background:#1da851;}
.btn-clear{background:#fff;color:#6b7a99;border:1px solid #d0d8e8;}
.btn-clear:hover{border-color:#e74c3c;color:#e74c3c;}
.btn-excel{background:#1d6f42;color:#fff;}
.btn-excel:hover{background:#2a8a54;}
.badge-count{font-size:11px;font-weight:700;padding:2px 10px;border-radius:10px;background:#1a3a6b;color:#fff;margin-left:4px;}
 
/* PAGE 4 TABLE */
.p4-toolbar{display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap;}
.p4-toolbar label{font-size:11px;font-weight:700;color:#6b7a99;letter-spacing:1px;text-transform:uppercase;}
.p4-toolbar select{border:1px solid #d0d8e8;border-radius:6px;padding:6px 12px;font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace;color:#1a3a6b;background:#fff;outline:none;cursor:pointer;min-width:160px;}
#p4Stats{font-size:12px;color:#6b7a99;flex:1;display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
 
.tbl-wrap{overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 240px);background:#fff;border:1px solid #d0d8e8;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.07);}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:1400px;}
thead th{font-size:10px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;padding:10px 8px;text-align:left;white-space:nowrap;position:sticky;top:0;z-index:3;background:#1a3a6b;color:#fff;}
thead th.xtra{background:#1a2e1a;}
thead th.xtra-first{background:#1a2e1a;border-left:3px solid #d0d8e8;}
tbody tr{border-bottom:1px solid #eef1f7;}
tbody tr:hover{background:#f7f9ff;}
tbody tr.high-row{background:#fff8e1;}
td{padding:7px 8px;vertical-align:middle;}
 
/* vehicle badge */
.vbadge{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:12px;padding:2px 8px;border-radius:5px;display:inline-block;}
.vbadge.sensor{background:#d4f5e2;color:#1a6b3a;}
.vbadge.normal{background:#fff3cd;color:#7a5300;}
 
/* inputs */
.inp{border:none;border-bottom:1px solid #d0d8e8;background:transparent;font-family:'JetBrains Mono',monospace;font-size:11px;outline:none;padding:3px 2px;}
.inp:focus{border-bottom-color:#1a3a6b;}
.inp-num{text-align:right;width:72px;color:#1d6f42;}
.inp-obd{text-align:right;width:72px;color:#006080;}
.inp-cons{text-align:right;width:72px;color:#c0392b;}
.inp-kmr{text-align:right;width:60px;color:#5a1a8a;}
.inp-time{width:110px;color:#2c3e50;}
.inp-date{width:100px;color:#1a3a6b;}
.inp-rmk{width:140px;color:#555;}
.inp-veh{width:90px;font-weight:700;color:#1a3a6b;border-bottom-color:#1a3a6b;}
.inp-qty{width:72px;color:#1d6f42;border-bottom-color:#1d6f42;}
 
/* dropdowns */
.sel-dev,.sel-ft{border:1px solid #e0e8f0;border-radius:5px;padding:3px 6px;font-size:10px;font-weight:600;cursor:pointer;outline:none;-webkit-appearance:none;appearance:none;width:100%;}
 
/* assumed badge */
.asm-badge{font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;margin-left:4px;cursor:pointer;user-select:none;border:1px solid #d0d8e8;background:#f4f6fa;color:#aaa;vertical-align:middle;}
.asm-badge.on{border-color:#e67e00;background:#fff3e0;color:#e67e00;}
 
/* # cell */
.idx-cell{padding:2px 4px;text-align:center;white-space:nowrap;min-width:54px;vertical-align:middle;}
.idx-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:#bbb;display:block;margin-bottom:2px;}
.btn-ins{display:block;width:100%;margin:1px 0;background:#e8f0ff;color:#1a3a6b;border:1px solid #b8d0f0;border-radius:3px;font-size:9px;font-weight:700;cursor:pointer;padding:1px 2px;font-family:'Inter',sans-serif;line-height:1.4;}
.btn-del{display:block;width:100%;background:#fde8e8;color:#c0392b;border:1px solid #f0b0b0;border-radius:3px;font-size:9px;font-weight:700;cursor:pointer;padding:2px;font-family:'Inter',sans-serif;}
 
/* separator */
.veh-sep td{background:#4a5568;color:#fff;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:7px 16px;border-top:3px solid #3d4a5c;}
.veh-sep.done td{background:#2d3748;opacity:0.8;}
 
/* diff */
.diff-pos{color:#e67e00;font-weight:700;}
.diff-neg{color:#c0392b;font-weight:700;}
.diff-zero{color:#1d6f42;font-weight:700;}
.diff-na{color:#bbb;}
</style>
</head>
<body>
 
<div class="topbar">
  <div class="logo">TASR / UIPL</div>
  <h1>⛽ Fuel Entry</h1>
</div>
 
<div class="main">
 
  <!-- WA INPUT -->
  <div class="input-panel" id="inputPanel">
    <div class="input-hint">Paste WhatsApp messages — timestamps and vehicle numbers extracted automatically.</div>
    <textarea id="waInput" placeholder="[25/03/26, 6:56:12 AM] Monu Ji Shitla: 5111 227.3 afis se&#10;[25/03/26, 9:01:06 PM] Monu Ji Shitla: 7560 142.11litar tiwari&#10;5011 137litar tiwsr"></textarea>
    <div class="btn-row">
      <button class="btn-primary" onclick="decode()">⚡ Decode Messages</button>
      <button class="btn-clear" onclick="clearAll()">✕ Clear</button>
      <span id="entryCount" style="display:none;">
        <span class="badge-count" id="cntBadge">0</span> entries
      </span>
    </div>
  </div>
 
  <!-- TABLE TOOLBAR -->
  <div class="p4-toolbar" id="p4Toolbar" style="display:none;">
    <label>Vehicle</label>
    <select id="vehSel" onchange="renderTable(this.value)"></select>
    <div id="p4Stats"></div>
    <button class="btn-excel" onclick="dlExcel()">⬇ Download Excel</button>
  </div>
 
  <!-- TABLE -->
  <div class="tbl-wrap" id="tblWrap" style="display:none;">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Vehicle No</th>
          <th>Fill Qty (L)</th>
          <th>Fill Date</th>
          <th>Notes</th>
          <th class="xtra-first" style="min-width:150px;">Device Availability</th>
          <th class="xtra" style="min-width:110px;">Time</th>
          <th class="xtra" style="min-width:80px;">Pump Fill</th>
          <th class="xtra" style="min-width:80px;">OBD Fill</th>
          <th class="xtra" style="min-width:100px;">Fill Type</th>
          <th class="xtra" style="min-width:80px;">Consumption</th>
          <th class="xtra" style="min-width:65px;">KMR</th>
          <th class="xtra" style="min-width:65px;">Diff</th>
          <th class="xtra" style="min-width:140px;">Remark</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
 
</div>
 
<script>
// ── CONSTANTS ──
const MS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MF=['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];
const SESSION_KEY='fuel_entry_v1';
 
const SENSOR_VEHICLES={
  '7560':'CG04NH7560','6111':'CG04PB6111','6112':'CG04PJ6112','6115':'CG04PM6115',
  '6117':'CG04PM6117','6120':'CG04PN6120','5211':'CG10BL5211','5111':'CG10BM5111',
  '2153':'CG10BT2153','2553':'CG10BT2553','3053':'CG10BT3053','3153':'CG10BT3153',
  '3353':'CG10BT3353','4053':'CG10BT4053','6299':'CG11BH6299','7899':'CG11BL7899','7336':'CG22X7336',
};
const isSen=v=>!!SENSOR_VEHICLES[v];
const fullName=v=>SENSOR_VEHICLES[v]||v;
 
// ── STORES ──
let parsedData=[];
let blankRows=[];
let _bid=1;
const extra={}; // key -> {devStatus,dt,pumpFill,obdFill,fillType,consumption,kmr,remark,assumed}
const vehDone={};
 
// ── SESSION ──
const SEL=()=>document.getElementById('vehSel')?.value||'__ALL__';
 
function saveSession(){
  try{
    localStorage.setItem(SESSION_KEY,JSON.stringify({
      parsedData, blankRows, extra, vehDone,
      waInput:document.getElementById('waInput')?.value||'',
      selVeh:SEL(), savedAt:new Date().toISOString()
    }));
  }catch(e){}
}
function loadSession(){
  try{
    const raw=localStorage.getItem(SESSION_KEY);
    if(!raw) return;
    const s=JSON.parse(raw);
    if(!s||!s.parsedData) return;
    parsedData=s.parsedData||[];
    blankRows=s.blankRows||[];
    Object.assign(extra,s.extra||{});
    Object.assign(vehDone,s.vehDone||{});
    if(s.waInput) document.getElementById('waInput').value=s.waInput;
    _bid=Math.max(1,...blankRows.map(b=>b._bid+1||1));
    if(parsedData.length) initTable(s.selVeh);
  }catch(e){}
}
let _st=null;
function sched(){ clearTimeout(_st); _st=setTimeout(()=>saveSession(),600); }
 
// ── HELPERS ──
function today(){ const d=new Date(); return {day:d.getDate(),month:d.getMonth(),year:d.getFullYear()}; }
function fmt(d){ return d?String(d.day).padStart(2,'0')+'-'+MS[d.month]+'-'+d.year:'—'; }
function fmtFull(d){ return d?String(d.day).padStart(2,'0')+' '+MF[d.month]+' '+d.year:''; }
function dsort(a,b){ return (a.year*10000+a.month*100+a.day)-(b.year*10000+b.month*100+b.day); }
function parseDate(s){
  if(!s||!s.trim()) return today();
  const m=s.trim().match(/^(\d{1,2})[-\/](\d{1,2})[-\/](\d{2,4})$/);
  if(m){ let y=parseInt(m[3]); if(y<100) y+=2000; return {day:parseInt(m[1]),month:parseInt(m[2])-1,year:y}; }
  const d=new Date(s); if(!isNaN(d)) return {day:d.getDate(),month:d.getMonth(),year:d.getFullYear()};
  return today();
}
function ekey(e){ return e._bid?'_b'+e._bid:e.vehicle+'|'+fmt(e.date)+'|'+(e.time||''); }
function getEx(e){ return extra[ekey(e)]||(extra[ekey(e)]={}); }
function setEx(e,k,v){ getEx(e)[k]=v; sched(); }
 
// ── DECODE ──
function parseWA(line){
  let date=null,time=null,sender=null,payload=line;
  const m=line.match(/^\[(\d{1,2})\/(\d{1,2})\/(\d{2,4}),\s*(\d{1,2}:\d{2}(?::\d{2})?(?:\s*[AP]M)?)\]\s*([^:]+):\s*(.+)$/i);
  if(m){
    const[,dd,mm,yy,t,sn,c]=m;
    const year=yy.length===2?2000+parseInt(yy):parseInt(yy);
    date={day:parseInt(dd),month:parseInt(mm)-1,year}; time=t.trim(); sender=sn.trim(); payload=c.trim();
  }
  const pm=payload.match(/^(\d{4})[.\s]*[\s,]*(\d+\.?\d*)\s*(?:li[ts]a?r?|L|ltr)?(?:\s+(.+))?$/i);
  if(!pm) return null;
  const qty=parseFloat(pm[2]); if(isNaN(qty)) return null;
  return {vehicle:pm[1],qty,date:date||today(),time:time||'',sender:sender||'',notes:(pm[3]||'').trim()};
}
function decode(){
  const raw=document.getElementById('waInput').value.trim();
  if(!raw) return;
  parsedData=[];
  raw.split('\n').forEach(l=>{ const e=parseWA(l.trim()); if(e) parsedData.push(e); });
  initTable(); sched();
}
function clearAll(){
  if(!confirm('Clear all data?')) return;
  parsedData=[]; blankRows=[]; Object.keys(extra).forEach(k=>delete extra[k]); Object.keys(vehDone).forEach(k=>delete vehDone[k]);
  document.getElementById('waInput').value='';
  document.getElementById('p4Toolbar').style.display='none';
  document.getElementById('tblWrap').style.display='none';
  document.getElementById('entryCount').style.display='none';
  document.getElementById('tbody').innerHTML='';
  localStorage.removeItem(SESSION_KEY);
}
 
// ── INIT TABLE (populate vehicle selector) ──
function initTable(selVeh){
  const vehs=[...new Set(parsedData.map(e=>e.vehicle))].sort((a,b)=>a.localeCompare(b,undefined,{numeric:true}));
  const sel=document.getElementById('vehSel');
  sel.innerHTML='<option value="__ALL__">— All Vehicles —</option>'+vehs.map(v=>`<option value="${v}">${isSen(v)?fullName(v):v}</option>`).join('');
  if(selVeh && (selVeh==='__ALL__'||vehs.includes(selVeh))) sel.value=selVeh;
  document.getElementById('p4Toolbar').style.display='flex';
  document.getElementById('tblWrap').style.display='block';
  document.getElementById('entryCount').style.display='inline-flex';
  document.getElementById('cntBadge').textContent=parsedData.length;
  renderTable(sel.value);
}
 
// ── INSERT BLANK ROW ──
function insertBlank(refEntry, pos){
  const id=_bid++;
  blankRows.push({_bid:id, _refKey:ekey(refEntry), _refVeh:refEntry.vehicle||'', _pos:pos, vehicle:'',qty:0,date:today(),notes:'',time:'',isBlank:true});
  sched(); renderTable(SEL());
}
function delBlank(id){
  blankRows=blankRows.filter(b=>b._bid!==id);
  sched(); renderTable(SEL());
}
 
// ── PARSE DATETIME ──
function parseDT(raw){
  if(!raw||!raw.trim()) return null;
  const m=raw.trim().match(/([A-Za-z]+)\s+(\d+)(?:st|nd|rd|th)?\s+\d{4},?\s+(\d{1,2}):(\d{2})(?::\d{2})?\s*(am|pm)/i);
  if(m){
    const mons={jan:'JANUARY',feb:'FEBRUARY',mar:'MARCH',apr:'APRIL',may:'MAY',jun:'JUNE',jul:'JULY',aug:'AUGUST',sep:'SEPTEMBER',oct:'OCTOBER',nov:'NOVEMBER',dec:'DECEMBER'};
    const day=parseInt(m[2]),mon=mons[m[1].toLowerCase().slice(0,3)]||m[1].toUpperCase();
    let hr=parseInt(m[3]),mn=m[4]; const ap=m[5].toLowerCase();
    if(ap==='pm'&&hr!==12) hr+=12; if(ap==='am'&&hr===12) hr=0;
    return `${String(day).padStart(2,'0')} ${mon} ${String(hr).padStart(2,'0')}:${mn}`;
  }
  return raw.trim();
}
 
// ── DEV OPTIONS ──
const DEV=[
  {v:'NO DEVICE',         l:'NO DEVICE',          bg:'#f4f4f4',c:'#888'},
  {v:'SENSOR NOT WORKING',l:'SENSOR NOT WORKING',  bg:'#fff8e1',c:'#7a5300'},
  {v:'NEED TIME OF FILL', l:'NEED TIME OF FILL',   bg:'#e8f8f0',c:'#1d6f42'},
  {v:'WORKING',           l:'WORKING',             bg:'#d1f5e0',c:'#1d6f42'},
  {v:'BS4',               l:'BS4',                 bg:'#e8f0ff',c:'#1a3a6b'},
];
 
// ── RENDER TABLE ──
function renderTable(veh){
  const showAll=!veh||veh==='__ALL__';
  const tb=document.getElementById('tbody'); tb.innerHTML='';
  const stats=document.getElementById('p4Stats');
 
  // Build entries
  let base;
  if(showAll){
    base=[...parsedData].sort((a,b)=>{ const v=a.vehicle.localeCompare(b.vehicle,undefined,{numeric:true}); return v!==0?v:dsort(a.date,b.date); });
  } else {
    base=[...parsedData.filter(e=>e.vehicle===veh)].sort((a,b)=>dsort(a.date,b.date));
  }
  let all=[...base];
  blankRows.forEach(br=>{
    if(!showAll&&br._refVeh!==veh) return;
    const ri=all.findIndex(e=>ekey(e)===br._refKey);
    if(ri>=0) all.splice(br._pos==='before'?ri:ri+1,0,br);
    else if(showAll||br._refVeh===veh) all.push(br);
  });
 
  let rowNum=1, total=0, lastVeh=null;
  const entries=parsedData.filter(e=>showAll||e.vehicle===veh);
 
  all.forEach(e=>{
    if(!e.isBlank) total+=e.qty;
    const isBlk=!!e.isBlank;
    const ex=getEx(e);
 
    // Vehicle separator (all mode)
    if(showAll){
      const tv=isBlk?(e._refVeh||''):e.vehicle;
      if(tv&&tv!==lastVeh){
        lastVeh=tv; const isDone=!!vehDone[tv]; const sn=isSen(tv);
        const sepTr=document.createElement('tr');
        sepTr.className='veh-sep'+(isDone?' done':'');
        const td=document.createElement('td'); td.colSpan=14;
        td.innerHTML=`🚛 <span style="font-family:'JetBrains Mono',monospace;">${sn?fullName(tv):tv}</span>
          <span style="opacity:0.6;font-size:10px;margin-left:8px;">${parsedData.filter(x=>x.vehicle===tv).length} fills</span>
          ${sn?'<span style="font-size:9px;background:rgba(255,255,255,0.18);padding:1px 7px;border-radius:8px;margin-left:6px;">📡 SENSOR</span>':''}`;
        // done checkbox
        const wrap=document.createElement('span'); wrap.style.cssText='float:right;display:inline-flex;align-items:center;gap:7px;';
        const chk=document.createElement('input'); chk.type='checkbox'; chk.checked=isDone;
        chk.style.cssText='width:15px;height:15px;cursor:pointer;accent-color:#28a745;';
        const lbl=document.createElement('label'); lbl.style.cssText='font-size:11px;font-weight:700;color:#fff;cursor:pointer;';
        lbl.textContent=isDone?'✅ COMPLETED':'Mark Complete';
        chk.addEventListener('change',()=>{ vehDone[tv]=chk.checked; lbl.textContent=chk.checked?'✅ COMPLETED':'Mark Complete'; sepTr.classList.toggle('done',chk.checked); sched(); });
        wrap.appendChild(chk); wrap.appendChild(lbl); td.appendChild(wrap);
        sepTr.appendChild(td); tb.appendChild(sepTr);
      }
    }
 
    const high=!isBlk&&e.qty>=150;
    const tr=document.createElement('tr');
    if(high) tr.classList.add('high-row');
 
    // # cell
    const tdI=document.createElement('td'); tdI.className='idx-cell';
    if(isBlk){
      const d=document.createElement('button'); d.className='btn-del'; d.textContent='✕ del';
      d.addEventListener('click',()=>delBlank(e._bid)); tdI.appendChild(d);
    } else {
      const n=document.createElement('span'); n.className='idx-num'; n.textContent=rowNum;
      const bb=document.createElement('button'); bb.className='btn-ins'; bb.textContent='+ before';
      bb.addEventListener('click',()=>insertBlank(e,'before'));
      const ba=document.createElement('button'); ba.className='btn-ins'; ba.textContent='+ after';
      ba.addEventListener('click',()=>insertBlank(e,'after'));
      tdI.appendChild(n); tdI.appendChild(bb); tdI.appendChild(ba); rowNum++;
    }
    tr.appendChild(tdI);
 
    // Vehicle
    const tdV=document.createElement('td');
    if(isBlk){
      const inp=document.createElement('input'); inp.type='text'; inp.className='inp inp-veh'; inp.placeholder='Vehicle No';
      if(e.vehicle) inp.value=e.vehicle;
      function sv(){ const br=blankRows.find(b=>b._bid===e._bid); if(br){br.vehicle=inp.value; br._refVeh=inp.value;} sched(); }
      inp.addEventListener('change',sv); inp.addEventListener('blur',sv); tdV.appendChild(inp);
    } else {
      const s=isSen(e.vehicle);
      tdV.innerHTML=`<span class="vbadge ${s?'sensor':'normal'}">${s?fullName(e.vehicle):e.vehicle}</span>`;
    }
    tr.appendChild(tdV);
 
    // Qty
    const tdQ=document.createElement('td'); tdQ.style.cssText='padding:7px 8px;vertical-align:middle;';
    if(isBlk){
      const inp=document.createElement('input'); inp.type='number'; inp.step='0.01'; inp.className='inp inp-qty'; inp.placeholder='Qty';
      if(e.qty) inp.value=e.qty;
      inp.addEventListener('change',()=>{ const br=blankRows.find(b=>b._bid===e._bid); if(br) br.qty=parseFloat(inp.value)||0; sched(); });
      tdQ.appendChild(inp);
    } else {
      const isAss=!!ex.assumed;
      const qs=document.createElement('span');
      qs.style.cssText=`font-family:'JetBrains Mono',monospace;font-weight:700;font-size:12px;color:${isAss?'#e67e00':high?'#e67e00':'#1d6f42'};`;
      qs.textContent=(isAss?'~ ':'')+e.qty.toFixed(2);
      const ab=document.createElement('span'); ab.className='asm-badge'+(isAss?' on':'');
      ab.textContent=isAss?'ASSUMED':'actual'; ab.title='Click to toggle';
      ab.addEventListener('click',()=>{ setEx(e,'assumed',!ex.assumed); renderTable(SEL()); });
      tdQ.appendChild(qs);
      tdQ.appendChild(document.createTextNode(' '));
      const sf=document.createElement('small'); sf.style.color='#aaa'; sf.textContent='L'; tdQ.appendChild(sf);
      tdQ.appendChild(ab);
      if(high){ const hb=document.createElement('span'); hb.style.cssText='font-size:9px;background:#ff9800;color:#fff;padding:1px 5px;border-radius:8px;margin-left:4px;font-weight:700;'; hb.textContent='HIGH'; tdQ.appendChild(hb); }
    }
    tr.appendChild(tdQ);
 
    // Fill Date
    const tdD=document.createElement('td');
    const inD=document.createElement('input'); inD.type='text'; inD.className='inp inp-date';
    inD.placeholder='DD-MMM-YYYY';
    inD.value=isBlk?(e.dateStr||fmt(e.date)):fmt(e.date);
    function saveDate(){
      if(isBlk){ e.dateStr=inD.value; const br=blankRows.find(b=>b._bid===e._bid); if(br) br.dateStr=inD.value; }
      else { const d=parseDate(inD.value); if(d){e.date=d; inD.value=fmt(d);} }
      sched();
    }
    inD.addEventListener('change',saveDate); inD.addEventListener('blur',saveDate);
    tdD.appendChild(inD); tr.appendChild(tdD);
 
    // Notes
    const tdN=document.createElement('td');
    if(isBlk){
      const inp=document.createElement('input'); inp.type='text'; inp.className='inp'; inp.style.width='90px'; inp.placeholder='Notes';
      if(e.notes) inp.value=e.notes;
      function sn2(){ const br=blankRows.find(b=>b._bid===e._bid); if(br) br.notes=inp.value; sched(); }
      inp.addEventListener('change',sn2); inp.addEventListener('blur',sn2); tdN.appendChild(inp);
    } else {
      tdN.innerHTML=`<span style="font-size:11px;color:#6b7a99;">${e.notes||'—'}</span>`;
    }
    tr.appendChild(tdN);
 
    // Extra cells helper
    const XS='border-left:1px solid #eef1f7;';
    const XS1='border-left:3px solid #d0d8e8;';
 
    // Device
    const tdDev=document.createElement('td'); tdDev.style.cssText=XS1+'padding:4px 6px;min-width:150px;';
    const selD=document.createElement('select'); selD.className='sel-dev';
    DEV.forEach(o=>{ const opt=document.createElement('option'); opt.value=o.v; opt.textContent=o.l; selD.appendChild(opt); });
    const defDev=ex.devStatus||(isSen(e.vehicle||'')?'NEED TIME OF FILL':'NO DEVICE');
    function applyDS(){ const f=DEV.find(o=>o.v===selD.value)||DEV[0]; selD.style.background=f.bg; selD.style.color=f.c; selD.style.borderColor=f.c+'55'; }
    selD.value=defDev; applyDS();
    selD.addEventListener('change',()=>{ setEx(e,'devStatus',selD.value); applyDS(); });
    tdDev.appendChild(selD); tr.appendChild(tdDev);
 
    // Time
    const tdT=document.createElement('td'); tdT.style.cssText=XS+'padding:4px 6px;';
    const inT=document.createElement('input'); inT.type='text'; inT.className='inp inp-time'; inT.placeholder='HH:MM';
    if(ex.dt) inT.value=ex.dt;
    inT.addEventListener('keydown',ev=>{ if(ev.key==='Enter'){ const p=parseDT(inT.value); if(p){inT.value=p; setEx(e,'dt',p); inT.blur();} } });
    inT.addEventListener('change',()=>{ const p=parseDT(inT.value); if(p) inT.value=p; setEx(e,'dt',inT.value||null); });
    tdT.appendChild(inT); tr.appendChild(tdT);
 
    // Pump Fill
    const tdP=document.createElement('td'); tdP.style.cssText=XS+'padding:4px 6px;';
    const inP=document.createElement('input'); inP.type='number'; inP.step='0.01'; inP.className='inp inp-num'; inP.placeholder='—';
    if(ex.pumpFill!=null) inP.value=ex.pumpFill;
    inP.addEventListener('change',()=>{ setEx(e,'pumpFill',inP.value!==''?parseFloat(inP.value):null); refreshDiff(tdDf,e); });
    tdP.appendChild(inP); tr.appendChild(tdP);
 
    // OBD Fill
    const tdO=document.createElement('td'); tdO.style.cssText=XS+'padding:4px 6px;';
    const inO=document.createElement('input'); inO.type='number'; inO.step='0.01'; inO.className='inp inp-obd'; inO.placeholder='—';
    if(ex.obdFill!=null) inO.value=ex.obdFill;
    inO.addEventListener('change',()=>setEx(e,'obdFill',inO.value!==''?parseFloat(inO.value):null));
    tdO.appendChild(inO); tr.appendChild(tdO);
 
    // Fill Type
    const tdFT=document.createElement('td'); tdFT.style.cssText=XS+'padding:4px 6px;min-width:100px;';
    const selFT=document.createElement('select'); selFT.className='sel-ft';
    [{v:'',l:'—'},{v:'FULL',l:'FULL'},{v:'NOT FULL',l:'NOT FULL'},{v:'LAST FULL',l:'LAST FULL'}].forEach(o=>{ const opt=document.createElement('option'); opt.value=o.v; opt.textContent=o.l; selFT.appendChild(opt); });
    function applyFT(){ const m={'FULL':['#e8f8f0','#1d6f42'],'NOT FULL':['#fff8e1','#7a5300'],'LAST FULL':['#f0e6ff','#5a1a8a']}; const s=m[selFT.value]||['#fafbfd','#888']; selFT.style.background=s[0]; selFT.style.color=s[1]; }
    if(ex.fillType) selFT.value=ex.fillType; applyFT();
    selFT.addEventListener('change',()=>{ setEx(e,'fillType',selFT.value||null); applyFT(); });
    tdFT.appendChild(selFT); tr.appendChild(tdFT);
 
    // Consumption
    const tdC=document.createElement('td'); tdC.style.cssText=XS+'padding:4px 6px;';
    const inC=document.createElement('input'); inC.type='number'; inC.step='0.01'; inC.className='inp inp-cons'; inC.placeholder='—';
    if(ex.consumption!=null) inC.value=ex.consumption;
    inC.addEventListener('change',()=>{ setEx(e,'consumption',inC.value!==''?parseFloat(inC.value):null); refreshDiff(tdDf,e); });
    tdC.appendChild(inC); tr.appendChild(tdC);
 
    // KMR
    const tdK=document.createElement('td'); tdK.style.cssText=XS+'padding:4px 6px;';
    const inK=document.createElement('input'); inK.type='number'; inK.step='0.01'; inK.className='inp inp-kmr'; inK.placeholder='—';
    if(ex.kmr!=null) inK.value=ex.kmr;
    inK.addEventListener('change',()=>setEx(e,'kmr',inK.value!==''?parseFloat(inK.value):null));
    tdK.appendChild(inK); tr.appendChild(tdK);
 
    // Diff
    const tdDf=document.createElement('td'); tdDf.style.cssText=XS+'padding:6px 8px;text-align:right;font-family:"JetBrains Mono",monospace;font-size:11px;';
    function refreshDiff(td,en){
      const x=getEx(en); const pf=x.pumpFill!=null?x.pumpFill:null, cn=x.consumption!=null?x.consumption:null;
      if(pf!=null&&cn!=null){ const d=pf-cn; td.textContent=d.toFixed(2); td.className=d>0?'diff-pos':d<0?'diff-neg':'diff-zero'; }
      else{ td.textContent='—'; td.className='diff-na'; }
    }
    refreshDiff(tdDf,e); tr.appendChild(tdDf);
 
    // Remark
    const tdR=document.createElement('td'); tdR.style.cssText=XS+'padding:4px 6px;';
    const inR=document.createElement('input'); inR.type='text'; inR.className='inp inp-rmk'; inR.placeholder='Add remark...';
    if(ex.remark) inR.value=ex.remark;
    inR.addEventListener('change',()=>setEx(e,'remark',inR.value||null));
    tdR.appendChild(inR); tr.appendChild(tdR);
 
    tb.appendChild(tr);
  });
 
  // Spacer
  const sp=document.createElement('tr'); const std=document.createElement('td'); std.colSpan=14; std.style.height='60px'; std.style.border='none'; sp.appendChild(std); tb.appendChild(sp);
 
  // Stats
  const tot=entries.reduce((s,e)=>s+e.qty,0);
  const vehs2=[...new Set(entries.map(e=>e.vehicle))].length;
  stats.innerHTML=showAll
    ? `<b style="color:#1a3a6b;">All Vehicles (${vehs2})</b> <span style="color:#d0d8e8;">|</span> ${entries.length} fills <span style="color:#d0d8e8;">|</span> <b style="color:#1d6f42;">${tot.toFixed(2)} L</b>`
    : `<b style="color:#1a3a6b;">${isSen(veh)?fullName(veh):veh}</b> <span style="color:#d0d8e8;">|</span> ${entries.length} fills <span style="color:#d0d8e8;">|</span> <b style="color:#1d6f42;">${tot.toFixed(2)} L</b> <span style="color:#d0d8e8;">|</span> Avg ${entries.length?(tot/entries.length).toFixed(1):0} L`;
}
 
// ── EXCEL DOWNLOAD ──
async function dlExcel(){
  if(!parsedData.length) return;
  const selVeh=SEL(); const showAll=selVeh==='__ALL__';
  const btn=event?.target; if(btn){btn.disabled=true;btn.textContent='Generating...';}
  try{
    const wb=new ExcelJS.Workbook(); wb.creator='TASR/UIPL';
    const hF=a=>({type:'pattern',pattern:'solid',fgColor:{argb:a}});
    const hFn=(a,s,b)=>({bold:!!b,color:{argb:a},size:s||11,name:'Arial'});
    const hA=(h,v)=>({horizontal:h||'center',vertical:v||'middle'});
    const dvC={'NEED TIME OF FILL':'FF1D6F42','SENSOR NOT WORKING':'FF7A5300','NO DEVICE':'FF888888','WORKING':'FF1D6F42','BS4':'FF1A3A6B'};
    const dvB={'NEED TIME OF FILL':'FFE8F8F0','SENSOR NOT WORKING':'FFFFF8E1','NO DEVICE':'FFF4F4F4','WORKING':'FFD1F5E0','BS4':'FFE8F0FF'};
 
    let base;
    if(showAll){ base=[...parsedData].sort((a,b)=>{ const v=a.vehicle.localeCompare(b.vehicle,undefined,{numeric:true}); return v!==0?v:dsort(a.date,b.date); }); }
    else{ base=[...parsedData.filter(e=>e.vehicle===selVeh)].sort((a,b)=>dsort(a.date,b.date)); }
    let all=[...base];
    blankRows.forEach(br=>{
      if(!showAll&&br._refVeh!==selVeh) return;
      const ri=all.findIndex(e=>ekey(e)===br._refKey);
      if(ri>=0) all.splice(br._pos==='before'?ri:ri+1,0,br); else if(showAll||br._refVeh===selVeh) all.push(br);
    });
 
    const sname=(showAll?'All Vehicles':(isSen(selVeh)?fullName(selVeh):selVeh)).substring(0,31);
    const ws=wb.addWorksheet(sname,{views:[{state:'frozen',ySplit:1}]});
    ws.columns=[{key:'i',width:5},{key:'v',width:16},{key:'q',width:13},{key:'d',width:16},{key:'n',width:14},{key:'dv',width:22},{key:'t',width:18},{key:'p',width:12},{key:'o',width:12},{key:'ft',width:13},{key:'c',width:13},{key:'k',width:11},{key:'df',width:11},{key:'r',width:22}];
    const hr=ws.getRow(1); hr.height=24;
    ['#','VEHICLE','FILL QTY','FILL DATE','NOTES','DEVICE AVAILABILITY','TIME','PUMP FILL','OBD FILL','FILL TYPE','CONSUMPTION','KMR','DIFF','REMARK'].forEach((l,i)=>{
      const cl=hr.getCell(i+1); cl.value=l;
      cl.fill=hF(i>=5?'FF1A2E1A':'FF1A3A6B'); cl.font=hFn('FFFFFFFF',10,true); cl.alignment=hA('center','middle');
      cl.border={bottom:{style:'medium',color:{argb:'FFFFC107'}}};
      if(i===5) cl.border={...cl.border,left:{style:'medium',color:{argb:'FFD0D8E8'}}};
    });
 
    let rn=1, lastVehXL=null;
    all.forEach(e=>{
      const isBlk=!!e.isBlank; const ex=getEx(e);
      if(showAll){
        const tv=isBlk?(e._refVeh||''):e.vehicle;
        if(tv&&tv!==lastVehXL){
          lastVehXL=tv; const isDone=!!vehDone[tv]; const sn2=isSen(tv);
          const sr=ws.addRow([]); sr.height=20;
          ws.mergeCells('A'+sr.number+':N'+sr.number);
          const sc=sr.getCell(1);
          sc.value=`🚛  ${sn2?fullName(tv):tv}  (${parsedData.filter(x=>x.vehicle===tv).length} fills)${isDone?' ✅':''}`;
          sc.fill=hF(isDone?'FF2D3748':'FF4A5568'); sc.font=hFn('FFFFFFFF',11,true); sc.alignment={horizontal:'left',vertical:'middle',indent:1};
        }
      }
      const high=!isBlk&&e.qty>=150; const isAss=!isBlk&&!!ex.assumed;
      const pf=ex.pumpFill!=null?ex.pumpFill:null; const cn=ex.consumption!=null?ex.consumption:null;
      const df=(pf!=null&&cn!=null)?pf-cn:null;
      const dv=ex.devStatus||(isSen(e.vehicle||'')?'NEED TIME OF FILL':'NO DEVICE');
      const row=ws.addRow({i:isBlk?'*':rn++,v:isBlk?(e.vehicle||''):e.vehicle,q:e.qty||null,d:isBlk?(e.dateStr||''):fmtFull(e.date),n:e.notes||'',dv,t:ex.dt||'',p:pf,o:ex.obdFill!=null?ex.obdFill:null,ft:ex.fillType||'',c:cn,k:ex.kmr!=null?ex.kmr:null,df,r:ex.remark||''});
      row.height=18;
      row.getCell(1).font=hFn('FFBBBBBB',9); row.getCell(1).alignment=hA('center');
      const vc=row.getCell(2); vc.fill=hF(isBlk?'FFE8EFFF':isSen(e.vehicle)?'FFD4F5E2':'FFFFF3CD'); vc.font=hFn(isBlk?'FF1A3A6B':isSen(e.vehicle)?'FF1A6B3A':'FF7A5300',12,true); vc.alignment=hA('center');
      const qc=row.getCell(3); qc.numFmt=isAss?'"~"0.00':'0.00'; qc.font=hFn(isAss?'FFE67E00':high?'FFE67E00':'FF1D6F42',12,true); qc.alignment=hA('center'); if(isAss) qc.fill=hF('FFFFF3E0'); else if(high) qc.fill=hF('FFFFF8E1');
      row.getCell(4).font=hFn('FF1A3A6B',11); row.getCell(4).alignment=hA('center');
      row.getCell(5).font=hFn('FF6B7A99',10);
      const dc=row.getCell(6); dc.font=hFn(dvC[dv]||'FF888888',10,true); dc.fill=hF(dvB[dv]||'FFF4F4F4'); dc.alignment=hA('center'); dc.border={left:{style:'medium',color:{argb:'FFD0D8E8'}}};
      row.getCell(7).font=hFn('FF2C3E50',11); row.getCell(7).alignment=hA('center');
      if(pf!=null){row.getCell(8).numFmt='0.00';row.getCell(8).font=hFn('FF1D6F42',11,true);row.getCell(8).alignment=hA('right');}
      if(ex.obdFill!=null){row.getCell(9).numFmt='0.00';row.getCell(9).font=hFn('FF006080',11,true);row.getCell(9).alignment=hA('right');}
      const ftc=row.getCell(10); if(ex.fillType==='FULL'){ftc.font=hFn('FF1D6F42',10,true);ftc.fill=hF('FFE8F8F0');}else if(ex.fillType==='NOT FULL'){ftc.font=hFn('FF7A5300',10,true);ftc.fill=hF('FFFFF8E1');}else if(ex.fillType==='LAST FULL'){ftc.font=hFn('FF5A1A8A',10,true);ftc.fill=hF('FFF0E6FF');} ftc.alignment=hA('center');
      if(cn!=null){row.getCell(11).numFmt='0.00';row.getCell(11).font=hFn('FFC0392B',11,true);row.getCell(11).alignment=hA('right');}
      if(ex.kmr!=null){row.getCell(12).numFmt='0.00';row.getCell(12).font=hFn('FF5A1A8A',11);row.getCell(12).alignment=hA('right');}
      if(df!=null){row.getCell(13).numFmt='0.00';row.getCell(13).font=hFn(df>0?'FFE67E00':df<0?'FFC0392B':'FF1D6F42',11,true);row.getCell(13).alignment=hA('right');}
      if(ex.remark){row.getCell(14).font=hFn('FF555555',10);row.getCell(14).alignment={horizontal:'left',vertical:'middle',wrapText:true};}
    });
 
    const buf=await wb.xlsx.writeBuffer();
    const blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const a=document.createElement('a'); const now=new Date();
    a.download=`FuelEntry_${showAll?'All':selVeh}_${now.getDate()}-${now.getMonth()+1}-${now.getFullYear()}.xlsx`;
    a.href=URL.createObjectURL(blob); a.click(); URL.revokeObjectURL(a.href);
  }catch(err){alert('Excel error: '+err.message);}
  if(btn){btn.disabled=false;btn.innerHTML='⬇ Download Excel';}
}
 
// ── INIT ──
window.addEventListener('DOMContentLoaded',()=>loadSession());
</script>
